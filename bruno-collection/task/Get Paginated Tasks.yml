info:
  name: Get Paginated Tasks
  type: http
  seq: 5

http:
  method: GET
  url: "{{url}}/tasks?limit=5&offset=-1"
  params:
    - name: limit
      value: "5"
      type: query
    - name: offset
      value: "-1"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
